<!-- COMPONENTE: FORMULARIO CRUD DE TURNO — SIGEPS V1.0 -->
<div class="crud-form" *ngIf="turnoForm" [formGroup]="turnoForm">

  <!-- ALERTA DE ELIMINACIÓN -->
  <div class="alerta-eliminar" *ngIf="banderaCrudEliminar">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <div>
      <strong>¿Está seguro de eliminar este turno?</strong>
      <p>Esta acción no se puede deshacer. El turno será eliminado permanentemente del sistema.</p>
    </div>
  </div>

  <input type="hidden" formControlName="ctextIdTurno">

  <!-- SECCIÓN: INFORMACIÓN DEL TURNO -->
  <div class="form-seccion">
    <p class="seccion-titulo">Información del Turno</p>
    <div class="form-grid">

      <div class="form-group form-group-full">
        <label>Nombre del Turno <span class="req">*</span></label>
        <input type="text" formControlName="ctextNombreTurno" placeholder="Ej: TURNO DIURNO A"
          [attr.disabled]="banderaCrudEliminar ? '' : null">
      </div>

      <div class="form-group">
        <label>Hora de Inicio <span class="req">*</span></label>
        <input type="time" formControlName="ctextHmsiniciacionTurno"
          [attr.disabled]="banderaCrudEliminar ? '' : null">
      </div>

      <div class="form-group">
        <label>Hora de Finalización <span class="req">*</span></label>
        <input type="time" formControlName="ctextHmsfinalizacionTurno"
          [attr.disabled]="banderaCrudEliminar ? '' : null">
      </div>

      <div class="form-group">
        <label>Estado <span class="req">*</span></label>
        <select formControlName="cboxEstadoTurno" [attr.disabled]="banderaCrudEliminar ? '' : null">
          <option value="ACTIVO">ACTIVO</option>
          <option value="INACTIVO">INACTIVO</option>
        </select>
      </div>

    </div>
  </div>

  <!-- BOTONES DE ACCIÓN -->
  <div class="form-acciones">
    <button type="button" class="btn-sigeps btn-secundario" (click)="closeModal()">Cancelar</button>
    <button type="button" class="btn-sigeps btn-primario"
      *ngIf="banderaCrudGuardar || banderaCrudModificar"
      [disabled]="!turnoForm.valid"
      (click)="accionesGuardarModificarEliminarRegistro(turnoForm.value)">
      <span *ngIf="banderaCrudGuardar">Guardar Turno</span>
      <span *ngIf="banderaCrudModificar">Modificar Turno</span>
    </button>
    <button type="button" class="btn-sigeps btn-peligro"
      *ngIf="banderaCrudEliminar"
      (click)="accionesGuardarModificarEliminarRegistro(turnoForm.value)">
      Eliminar Turno
    </button>
  </div>

</div>

<!-- DIÁLOGO DE CONFIRMACIÓN DE ELIMINACIÓN -->
<div class="confirmacion-overlay" *ngIf="banderaConfirmacionEliminacion">
  <div class="confirmacion-caja">
    <div class="confirmacion-icono">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <h4 class="confirmacion-titulo">Confirmar Eliminación</h4>
    <p class="confirmacion-mensaje">¿Está seguro de que desea eliminar este turno? Esta acción no se puede deshacer.</p>
    <div class="confirmacion-botones">
      <button class="btn-confirmacion btn-no" (click)="noConfirmacionEliminacionRegistro()">No, Cancelar</button>
      <button class="btn-confirmacion btn-si" (click)="siConfirmacionEliminacionRegistro()">Sí, Eliminar</button>
    </div>
  </div>
</div>
